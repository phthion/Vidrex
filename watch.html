<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watching | YouToo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center items-center h-screen">
    <div class="max-w-4xl w-full p-4">
        <div id="player" class="aspect-video bg-black rounded-2xl overflow-hidden">
            </div>
        <a href="index.html" class="mt-4 inline-block text-gray-500 hover:text-black">← Back Home</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        
        document.getElementById('player').innerHTML = `
            <iframe width="100%" height="100%" 
                src="https://www.youtube-nocookie.com/embed/${videoId}?rel=0&modestbranding=1" 
                frameborder="0" allowfullscreen>
            </iframe>
        `;
    </script>
</body>
</html>
