<!DOCTYPE html>
<html lang="en">
<head>
    <title>Watch YouToo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white p-10">
    <div class="max-w-5xl mx-auto">
        <a href="index.html" class="text-red-600 font-bold">← Back to Home</a>
        <div id="player" class="aspect-video bg-black rounded-2xl mt-4"></div>
        <div class="mt-6">
            <h1 id="title" class="text-3xl font-bold"></h1>
            <a id="channel-link" class="text-blue-600 font-semibold mt-2 block"></a>
            <div class="mt-4 text-gray-600 space-y-2">
                <p id="stats"></p>
                <p id="description" class="whitespace-pre-line"></p>
            </div>
        </div>
    </div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        document.getElementById('player').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
        
        fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${id}&key=AIzaSyDpifV8J2_NIouCqiTBiQFTiAt-YH-XNWU`)
        .then(r => r.json()).then(d => {
            const v = d.items[0];
            document.getElementById('title').innerText = v.snippet.title;
            document.getElementById('channel-link').innerText = v.snippet.channelTitle;
            document.getElementById('stats').innerText = `Views: ${parseInt(v.statistics.viewCount).toLocaleString()} | Date: ${new Date(v.snippet.publishedAt).toUTCString()}`;
            document.getElementById('description').innerText = v.snippet.description;
        });
    </script>
</body>
</html>
