<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watch | YouToo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10 dark:bg-black dark:text-white">
    <div class="max-w-6xl mx-auto grid grid-cols-3 gap-10">
        <div class="col-span-2">
            <div id="player" class="aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl"></div>
            <div class="mt-8 bg-white p-8 rounded-3xl shadow-sm dark:bg-gray-900">
                <h1 id="title" class="text-2xl font-bold"></h1>
                <div id="meta" class="flex gap-6 mt-4 text-gray-600 dark:text-gray-400 font-medium"></div>
                <div class="mt-6 border-t dark:border-gray-700 pt-6 flex gap-4">
                    <button class="bg-gray-100 dark:bg-gray-800 px-8 py-3 rounded-full font-bold">Like</button>
                    <button class="bg-red-600 text-white px-8 py-3 rounded-full font-bold">Subscribe</button>
                </div>
            </div>
        </div>
        <aside class="space-y-4">
            <h2 class="font-bold text-lg mb-6">Up Next</h2>
            <div id="sidebar-list"></div>
        </aside>
    </div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        document.getElementById('player').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&modestbranding=1" allowfullscreen></iframe>`;
        
        fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${id}&key=AIzaSyDpifV8J2_NIouCqiTBiQFTiAt-YH-XNWU`)
        .then(r => r.json()).then(d => {
            const v = d.items[0];
            document.getElementById('title').innerText = v.snippet.title;
            document.getElementById('meta').innerText = `👁️ ${parseInt(v.statistics.viewCount).toLocaleString()} views • 📅 ${v.snippet.publishedAt.split('T')[0]}`;
        });
    </script>
</body>
</html>
