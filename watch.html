<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watching | YouToo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <a href="index.html" class="text-gray-500 hover:text-black mb-4 block font-medium">← Back to Feed</a>
        <div id="player" class="aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        document.getElementById('player').innerHTML = `
            <iframe width="100%" height="100%" 
                src="https://www.youtube-nocookie.com/embed/${id}?rel=0&modestbranding=1&autoplay=1" 
                frameborder="0" allowfullscreen>
            </iframe>
        `;
    </script>
</body>
</html>
