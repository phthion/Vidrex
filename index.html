<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouToo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="bg-white border-b p-6 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-3xl font-black text-red-600 cursor-pointer" onclick="location.reload()">YouToo</h1>
        <div class="w-1/2">
            <input type="text" id="search-input" placeholder="Search human-made long-form videos..." class="w-full border rounded-full px-6 py-2 outline-none focus:ring-2 focus:ring-red-500">
        </div>
    </nav>
    <div class="max-w-7xl mx-auto p-8 flex gap-8">
        <aside class="w-1/5">
            <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Categories</h2>
            <ul class="space-y-3 font-semibold text-gray-600">
                <li onclick="fetchVideos('travel')" class="cursor-pointer hover:text-red-600">Travel</li>
                <li onclick="fetchVideos('music')" class="cursor-pointer hover:text-red-600">Music</li>
                <li onclick="fetchVideos('technology')" class="cursor-pointer hover:text-red-600">Technology</li>
            </ul>
        </aside>
        <main id="video-grid" class="w-4/5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-gray-500">Loading content...</p>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
